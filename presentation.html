<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Internship Progress Presentation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
    html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #050816;
        font-family: 'Inter', sans-serif;
    }

    body {
        position: relative;
    }

    .presentation-shell {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
            radial-gradient(circle at top right, rgba(77, 163, 255, 0.18), transparent 24%),
            radial-gradient(circle at bottom left, rgba(15, 76, 129, 0.22), transparent 28%),
            #050816;
    }

    .slide-frame {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: transparent;
    }

    .slide-nav {
        position: fixed;
        bottom: 24px;
        z-index: 9999;
    }

    .slide-nav--left {
        left: 24px;
    }

    .slide-nav--right {
        right: 24px;
        display: flex;
        gap: 12px;
    }

    .slide-nav__button {
        min-width: 120px;
        padding: 10px 18px;
        border: 1px solid rgba(77, 163, 255, 0.45);
        border-radius: 999px;
        background: rgba(15, 76, 129, 0.88);
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, background 0.2s ease, opacity 0.2s ease;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
    }

    .slide-nav__button:hover:not(:disabled) {
        background: rgba(77, 163, 255, 0.95);
        transform: translateY(-1px);
    }

    .slide-nav__button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
    }

    @media (max-width: 768px) {
        .slide-nav {
            bottom: 16px;
        }

        .slide-nav--left {
            left: 16px;
        }

        .slide-nav--right {
            right: 16px;
            gap: 8px;
        }

        .slide-nav__button {
            min-width: 96px;
            padding: 9px 14px;
            font-size: 13px;
        }
    }
</style>
</head>
<body>
<div class="presentation-shell">
    <iframe class="slide-frame" id="slideFrame" title="Presentation slide"></iframe>
</div>

<div class="slide-nav slide-nav--left">
    <button class="slide-nav__button" id="previousButton" type="button">Previous</button>
</div>

<div class="slide-nav slide-nav--right">
    <button class="slide-nav__button" id="fullscreenButton" type="button">Fullscreen</button>
    <button class="slide-nav__button" id="nextButton" type="button">Next</button>
</div>

<script>
    (function () {
        var totalSlides = 18;
        var params = new URLSearchParams(window.location.search);
        var currentSlide = Number(params.get("slide")) || 1;
        var slideFrame = document.getElementById("slideFrame");
        var previousButton = document.getElementById("previousButton");
        var nextButton = document.getElementById("nextButton");
        var fullscreenButton = document.getElementById("fullscreenButton");

        function clampSlide(slideNumber) {
            return Math.min(Math.max(slideNumber, 1), totalSlides);
        }

        function syncButtons() {
            previousButton.disabled = currentSlide <= 1;
            nextButton.disabled = currentSlide >= totalSlides;
            fullscreenButton.textContent = document.fullscreenElement ? "Exit Fullscreen" : "Fullscreen";
        }

        function loadSlide(slideNumber, replaceHistory) {
            currentSlide = clampSlide(slideNumber);
            slideFrame.src = "slide" + currentSlide + ".html";

            var url = new URL(window.location.href);
            url.searchParams.set("slide", String(currentSlide));

            if (replaceHistory) {
                window.history.replaceState({ slide: currentSlide }, "", url);
            } else {
                window.history.pushState({ slide: currentSlide }, "", url);
            }

            syncButtons();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(function () {
                    return null;
                });
                return;
            }

            document.exitFullscreen().catch(function () {
                return null;
            });
        }

        previousButton.addEventListener("click", function () {
            loadSlide(currentSlide - 1, false);
        });

        nextButton.addEventListener("click", function () {
            loadSlide(currentSlide + 1, false);
        });

        fullscreenButton.addEventListener("click", toggleFullscreen);

        document.addEventListener("keydown", function (event) {
            if (event.key === "ArrowLeft" && currentSlide > 1) {
                loadSlide(currentSlide - 1, false);
            }

            if (event.key === "ArrowRight" && currentSlide < totalSlides) {
                loadSlide(currentSlide + 1, false);
            }

            if (event.key === "f" || event.key === "F") {
                toggleFullscreen();
            }
        });

        document.addEventListener("fullscreenchange", syncButtons);

        window.addEventListener("popstate", function (event) {
            var stateSlide = event.state && event.state.slide ? Number(event.state.slide) : Number(new URLSearchParams(window.location.search).get("slide")) || 1;
            loadSlide(stateSlide, true);
        });

        window.addEventListener("message", function (event) {
            if (!event.data || event.data.type !== "slide-ready") {
                return;
            }

            if (typeof event.data.slide === "number") {
                currentSlide = clampSlide(event.data.slide);
                syncButtons();
            }
        });

        loadSlide(currentSlide, true);
    })();
</script>
</body>
</html>
