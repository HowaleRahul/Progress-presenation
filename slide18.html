<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thank You</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;family=Fira+Code:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        .slide-container {
            width: 1280px;
            height: 720px;
            background-color: #1a1a2e;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            align-items: center;
            justify-content: center;
        }

        /* Ambient Background */
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }
        .blob-center { width: 600px; height: 600px; background-color: #0f4c81; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .blob-tr { width: 400px; height: 400px; background-color: #4da3ff; top: -100px; right: -100px; opacity: 0.1; }
        .blob-bl { width: 300px; height: 300px; background-color: #4da3ff; bottom: -50px; left: -50px; opacity: 0.1; }

        /* Main Content Card */
        .thank-you-card {
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            max-width: 900px;
            width: 100%;
        }

        .main-heading {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 110px;
            line-height: 1.1;
            letter-spacing: -3px;
            color: #ffffff;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin: 0;
        }

        .sub-heading {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 36px;
            color: #4da3ff;
            letter-spacing: 1px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .sub-heading::before, .sub-heading::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background-color: #4da3ff;
            border-radius: 2px;
            opacity: 0.6;
        }

        /* Animated Divider */
        .divider {
            width: 160px;
            height: 4px;
            background-color: #2d3748;
            border-radius: 2px;
            margin: 20px 0 0 0;
            position: relative;
            overflow: hidden;
        }
        .divider::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 40%;
            background-color: #4da3ff;
            border-radius: 2px;
            animation: slide 3s ease-in-out infinite alternate;
        }

        @keyframes slide {
            0% { left: 0; width: 40%; }
            100% { left: 60%; width: 40%; }
        }

        /* Footer */
        .slide-footer {
            position: absolute;
            bottom: 30px;
            right: 50px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            color: #718096;
        }

        /* Decorative Elements */
        .decoration-line {
            position: absolute;
            background-color: rgba(77, 163, 255, 0.08);
            z-index: 1;
            pointer-events: none;
        }
        .line-v { width: 1px; height: 100%; top: 0; left: 120px; }
        .line-h { width: 100%; height: 1px; top: 120px; left: 0; }
        
        .corner-accent {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #4da3ff;
            opacity: 0.4;
            z-index: 5;
            pointer-events: none;
        }
        .tl { top: 40px; left: 40px; border-right: 0; border-bottom: 0; }
        .br { bottom: 40px; right: 40px; border-left: 0; border-top: 0; }

        .icon-floating {
            font-size: 64px;
            color: #4da3ff;
            opacity: 0.8;
            margin-bottom: 10px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

    </style>
</head>
<body>
<div class="slide-container">
<!-- Ambient Background -->
<div class="bg-blob blob-center"></div>
<div class="bg-blob blob-tr"></div>
<div class="bg-blob blob-bl"></div>
<!-- Geometric Decorations -->
<div class="decoration-line line-v"></div>
<div class="decoration-line line-h"></div>
<div class="corner-accent tl"></div>
<div class="corner-accent br"></div>
<!-- Main Content -->
<div class="thank-you-card">
<!-- Floating Icon -->
<div class="icon-floating">
<i class="fas fa-check-circle"></i>
</div>
<h1 class="main-heading">Thank You!</h1>
<div class="sub-heading">Any Questions?</div>
<div class="divider"></div>
</div>
<!-- Footer -->
<div class="slide-footer">
            18 / 18
        </div>
</div>
    <script src="slide-navigation.js"></script>
</body>
</html>
